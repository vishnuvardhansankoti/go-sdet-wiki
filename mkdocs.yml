site_name: Go SDET Wiki
site_description: A complete Go learning portal for SDETs with runnable code, Testcontainers, and a capstone microservice.
site_url: https://vishnuvardhansankoti.github.io/go-sdet-wiki/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_javascript:
  - assets/js/playground.js
  - assets/wasm/wasm_exec.js
  - assets/js/layout-toggle.js

extra_css:
  - assets/css/custom.css

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.snippets:
      base_path:
        - docs/_includes
  - toc:
      permalink: true
  - tables
  - footnotes
  - attr_list
  - md_in_html

